name: Pipeline CI/CD complet

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier que le projet existe
        run: echo "Vérification OK ✅"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Vercel CLI (dernière version)
        run: npm install --global vercel@latest

      - name: Récupérer la config du projet
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Builder le projet
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Déployer sur Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}